name: Build And Upload Release Asset

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag_name:
        description: "GitHub Release tag to attach the skill bundle zip to"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    if: startsWith(github.event.release.tag_name || github.event.inputs.tag_name, 'v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag_name || github.event.release.tag_name || github.ref }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify runtime artifacts
        shell: bash
        run: |
          set -euo pipefail
          test -s skills/mikuproject/runtime/mikuproject.jar
          test -s skills/mikuproject/runtime/mikuproject.mjs
          java -jar skills/mikuproject/runtime/mikuproject.jar ai spec >/dev/null
          node skills/mikuproject/runtime/mikuproject.mjs ai spec >/dev/null

      - name: Build release bundle
        run: npm run build

      - name: Locate release zip
        id: locate_zip
        shell: bash
        run: |
          set -euo pipefail
          zip_path="$(find bundle -maxdepth 1 -type f -name 'igapyon-mikuproject-skills-*.zip' | head -n 1)"
          if [[ -z "${zip_path}" ]]; then
            echo "release zip not found under bundle/" >&2
            exit 1
          fi
          echo "zip_path=${zip_path}" >> "$GITHUB_OUTPUT"

      - name: Upload zip to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.event.release.tag_name || github.ref_name }}
          files: ${{ steps.locate_zip.outputs.zip_path }}
          draft: false
          prerelease: false
