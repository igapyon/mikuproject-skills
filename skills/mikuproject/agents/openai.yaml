interface:
  display_name: "mikuproject"
  short_description: "AI JSON workflow for mikuproject WBS"
  default_prompt: "Use $mikuproject to work with mikuproject AI JSON workflows for WBS drafting, workbook exchange, patch application, and final exports. Prefer agent-internal execution: keep spec, draft, patch, and workbook artifacts off-screen unless the user explicitly asks to see them. By default, treat mikuproject as opt-in. Start mikuproject mode only when the user explicitly names mikuproject or uses a close trigger such as 'miku project', 'miku proj', 'miku prj', `ミク プロジェクト`, or `ミクプロジェクト`, or when the recent conversation is already inside an active mikuproject workflow started by such a trigger. Do not trigger mikuproject from planning words or export-format words alone. Without an explicit trigger or active mikuproject context, do not force mikuproject just because the user mentioned WBS, schedule, Excel, xlsx, image, SVG, Mermaid, ガント, or ガントチャート. Once mikuproject mode is active, prefer to keep follow-up work inside mikuproject interfaces when that remains a reasonable fit. Generate needed draft, patch, workbook, import, and export artifacts internally, import or apply them through mikuproject, keep resulting workbook state internal, and answer with a concise result summary or the final export the user requested. Only show raw spec, project_draft_view, Patch JSON, or workbook JSON when explicit inspection or fallback display is truly required. For a new WBS from rough requirements, use project_draft_view and do not drift into task_edit_view, phase_detail_view, project_overview_view, or generic .editjson wording. Reserve Patch JSON for revising an existing workbook state. Inside an active mikuproject workflow, do not fall back to ad-hoc Markdown tables, hand-written gantt output, tmp scripts, or one-off converters when the mikuproject interface can handle the request cleanly. Resolve short format requests such as markdown, xlsx, svg, and mermaid as mikuproject export requests when that is the natural continuation of the active workflow. For export requests, use the matching mikuproject export operation directly unless the user explicitly asks for another fallback. For ambiguous report-style requests inside an active mikuproject planning context, prefer WBS Markdown first. Do not treat Mermaid as the default report format; use Mermaid when the user explicitly asks for Mermaid or clearly needs Mermaid-compatible text. Spreadsheet-like words such as Excel, xlsx, xls, スプレッド, and スプレッドシート should prefer mikuproject WBS XLSX. Image-like words such as 画像, 図, ビジュアル, 見た目, and 表示 should prefer SVG. For ガント or ガントチャート, do not default to Mermaid: prefer WBS XLSX when spreadsheet-like words are present, prefer SVG when image-like words are present, use Mermaid only when Mermaid is explicitly requested, and otherwise prefer WBS XLSX. Use SVG exports when the user asks for SVG or names a time scale such as daily, weekly, or monthly calendar. Unless the user asks for another location, place generated files under `mikuproject/` in the workspace: state artifacts in `mikuproject/state/`, final exports in `mikuproject/report/`, and scratch files in `mikuproject/tmp/`. Prefer explicit `--out` paths under that tree, do not write generated files to the workspace root, and use a shared `YYYYMMDDHHmm-` prefix for artifacts from the same run."
