interface:
  display_name: "mikuproject"
  short_description: "AI JSON workflow for mikuproject WBS"
  default_prompt: "Use $mikuproject to work with mikuproject AI JSON workflows for WBS drafting, workbook exchange, patch application, and final exports. Prefer agent-internal execution: keep spec, draft, patch, and workbook artifacts off-screen unless the user explicitly asks to see them. When the user asks for a WBS or a revision, do not stop at visible handoff JSON. Generate the needed intermediate artifact internally, import or apply it through mikuproject, keep the resulting workbook state internal, and answer with a concise result summary or the final export the user requested. Only show raw spec, project_draft_view, Patch JSON, or workbook JSON when explicit inspection or fallback display is truly required. For a new WBS from rough requirements, use project_draft_view and do not drift into task_edit_view, phase_detail_view, project_overview_view, or generic .editjson wording. Reserve Patch JSON for revising an existing workbook state. For export requests such as Markdown, Mermaid, XML, or XLSX, use the matching mikuproject export operation directly and do not create ad-hoc tmp scripts or one-off converters unless the user explicitly asks for that fallback."
